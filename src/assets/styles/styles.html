<!-- styles.html -->

<!-- === START: header === -->
<style>

    /* Section main */
    header.stAppHeader {
        background-color: transparent;
    }
    section.stMain .block-container {
        padding-top: 0rem;
    } 

</style>
<!-- === END: header === -->

<!-- === START: sidebar === -->
<style>

    /* Largeur fixe */
    section[data-testid = "stSidebar"] {
        width: 210px !important;
    }
    /* Ombre */
    [data-testid = "stSidebar"] > div:first-child {
        box-shadow: 4px 0 8px #727272;
    }
    /* Couleur du fond */
    [data-testid = "stSidebarContent"] {
        background-color: #b74271a9;
    }
    /* Menu */
    [data-testid = "stSidebarNav"] span {
        color: #000000 !important;
        font-size: 15px !important;
    }
    /* Titre du menu */
    [data-testid = "stNavSectionHeader"] {
        font-family: system-ui;
        font-weight: bold !important;
        font-size: 22px !important;
    }
    /* Page sélectionnée */
    [data-testid="stSidebarNavLink"][aria-current="page"] {
        background-color: #F2F6FC !important;
    }

    /* Survol */
    [data-testid="stSidebarNavLink"]:hover {
        background-color: #E9EBF2 !important;
    }
</style>
<!-- === END: sidebar === -->


<!-- === START: hero === -->
<style>
    .stMainBlockContainer {
        padding-top: 0rem !important;
        margin-top: -40px !important;
    }

    .hero-wrapper {
        display: flex;
        justify-content: center;
        padding: 0rem 0rem 1.5rem;
    }

    .hero {
        position: relative;
        width: 100%;
        height: 400px;
        background-size: cover;
        background-position: left center;
        border-radius: 15px;
        overflow: hidden;
    }

    .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.1);
    }

    .hero-titre {
        position: absolute;
        top: 35%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: system-ui;
        font-size: 40px !important;
        font-weight: bold;
        text-shadow: 2px 2px 8px #000000;
        white-space: nowrap;
    }

    .hero-tagline {
        position: absolute;
        top: 52%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #ffffff;
        font-family: system-ui;
        font-size: 20px !important;
        font-weight: 500;
        font-style: oblique;
        letter-spacing: 0.06em;
        white-space: nowrap;
    }

    .hero-description {
        position: absolute;
        top: 75%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 16px !important;
        font-weight: 400;
        text-shadow: 1px 1px 4px #000000;
        text-align: center;
        width: 80%;
    }
</style>
<!-- === END: hero === -->


<!-- === START: footer === -->
<style>

/* Conteneur footer fixé en bas de page */
    .footer-image {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100vw;
        pointer-events: none;  /* évite que le footer bloque les clics */
    }

    .footer-image img {
        object-fit: contain;
        opacity: 0.6; /* optionnel: transparence pour un effet "fond" */
    }

</style>
<!-- === END: footer === -->
